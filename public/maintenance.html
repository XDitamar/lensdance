<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Lensdance - אתר בתחזוקה"
    />
    <title>Lensdance - אתר בתחזוקה</title>
    <style>
      :root {
        --brown-700: #5b4232;
        --brown-600: #6a402a;
        --brown-500: #8c705e;
        --bg: #f8f5ed;
        --text: #333;
      }
      
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      
      body {
        margin: 0;
        font-family: 'Georgia', serif;
        color: var(--text);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        text-align: center;
        direction: rtl;
      }
      
      .navbar {
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        box-shadow: 0 1px 4px rgba(0,0,0,.08);
        gap: 12px;
      }
      
      .logo-container { 
        display: flex; 
        align-items: center; 
        gap: 10px;
      }
      
      .logo { 
        height: 45px;
      }
      
      .site-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.6em;
        color: var(--brown-600);
        text-decoration: none;
        line-height: 1;
        white-space: nowrap;
      }
      
      .maintenance-container {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      
      .maintenance-card {
        background: #fff;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 8px 30px rgba(0,0,0,.06);
        width: 100%;
        max-width: 600px;
      }
      
      .section-title {
        font-family: 'Playfair Display', serif;
        font-size: 2.5em;
        color: var(--brown-600);
        margin: 0 0 30px;
        padding-bottom: 10px;
        position: relative;
      }
      
      .section-title::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: 80px;
        height: 3px;
        background: var(--brown-500);
        border-radius: 2px;
      }
      
      .maintenance-text {
        font-size: 1.2em;
        line-height: 1.6;
        margin-bottom: 30px;
      }
      
      .emoji {
        font-size: 60px;
        margin-bottom: 20px;
      }
      
      .maintenance-image {
        width: 100%;
        max-width: 300px;
        margin: 20px auto;
        border-radius: 8px;
        box-shadow: 0 4px 12px rgba(0,0,0,.1);
      }
      
      .footer {
        background: #333;
        color: #fff;
        text-align: center;
        padding: 25px;
        font-size: .9em;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      
      @media (max-width: 768px) {
        .maintenance-card {
          padding: 30px 20px;
        }
        
        .section-title {
          font-size: 2em;
        }
        
        .maintenance-text {
          font-size: 1.1em;
        }
      }
      
      @media (max-width: 480px) {
        .maintenance-card {
          padding: 25px 15px;
        }
        
        .section-title {
          font-size: 1.8em;
        }
        
        .maintenance-text {
          font-size: 1em;
        }
        
        .emoji {
          font-size: 50px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header similar to the main site -->
    <div class="navbar">
      <div class="logo-container">
        <img src="logo192.png" alt="Lensdance Logo" class="logo">
        <span class="site-title">Lensdance</span>
      </div>
    </div>
    
    <div class="maintenance-container">
      <div class="maintenance-card">
        <div class="emoji">🛠️</div>
        <h1 class="section-title">האתר בתחזוקה</h1>
        <p class="maintenance-text">אנו עובדים על שיפור האתר כדי להעניק לכם חוויה טובה יותר.</p>
        <p class="maintenance-text">נחזור בקרוב עם תכונות חדשות ושיפורים!</p>
        <div class="maintenance-image">
          <img src="logo512.png" alt="Lensdance" style="width: 100%; border-radius: 8px;">
        </div>
        <p class="maintenance-text">תודה על הסבלנות והבנה.</p>
      </div>
    </div>
    
    <footer class="footer">
      <div>© Lensdance</div>
    </footer>
  </body>
</html>
